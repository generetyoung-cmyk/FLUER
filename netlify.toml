# ── FLUER Protocol — Netlify Build Configuration ──────────────

[build]
  command       = "turbo run build --filter @fluer/web"
  publish       = "apps/web/.next"

[build.environment]
  NODE_VERSION         = "20"
  PNPM_VERSION         = "9"
  NEXT_PRIVATE_TARGET  = "server"
  # NOTE: Set NEXT_PUBLIC_* secrets in Netlify UI → Site Settings → Environment Variables
  # Required: NEXT_PUBLIC_HELIUS_API_KEY, NEXT_PUBLIC_HELIUS_RPC_URL,
  #           NEXT_PUBLIC_HELIUS_WS_URL

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Redirects / SPA fallback ───────────────────────────────────
[[redirects]]
  from   = "/api/v1/*"
  to     = "https://api.fluer.io/api/v1/:splat"
  status = 200

[[redirects]]
  from   = "/ws"
  to     = "https://api.fluer.io/ws"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-DNS-Prefetch-Control       = "on"
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options       = "nosniff"
    X-Frame-Options              = "DENY"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
